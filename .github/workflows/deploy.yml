name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate site
        run: |
          if [ ! -f index.html ]; then
            echo "Error: index.html not found"
            exit 1
          fi
          echo "Static site validation passed"

      - name: Report build status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
            MESSAGE="Build completed successfully"
          else
            STATUS="failure"
            MESSAGE="Build failed"
          fi

          echo "Build status: ${STATUS} — ${MESSAGE}"

          {
            echo "## Build Report"
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Status | ${STATUS} |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Message | ${MESSAGE} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
            URL="${{ steps.deployment.outputs.page_url }}"
            MESSAGE="Deployed to GitHub Pages"
          else
            STATUS="failure"
            URL="n/a"
            MESSAGE="Deploy failed"
          fi

          echo "Deploy status: ${STATUS} — ${MESSAGE}"
          if [ "${STATUS}" = "success" ]; then
            echo "Live URL: ${URL}"
          fi

          {
            echo "## Deploy Report"
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Status | ${STATUS} |"
            echo "| URL | ${URL} |"
            echo "| Message | ${MESSAGE} |"
          } >> "$GITHUB_STEP_SUMMARY"
